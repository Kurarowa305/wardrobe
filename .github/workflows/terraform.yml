name: Terraform

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_IN_AUTOMATION: true
  TF_INPUT: 0

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lambda package
        run: bash infra/terraform/app/scripts/package-lambda.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init
        working-directory: infra/terraform/app

      - name: Terraform workspace
        run: terraform workspace select dev || terraform workspace new dev
        working-directory: infra/terraform/app

      - name: Terraform plan
        run: terraform plan -var-file=../env/dev.tfvars
        working-directory: infra/terraform/app

  apply:
    runs-on: ubuntu-latest
    needs: plan
    concurrency:
      group: wardrobe-dev-terraform
      cancel-in-progress: false

    outputs:
      web_bucket_name: ${{ steps.tf-outputs.outputs.web_bucket_name }}
      web_distribution_id: ${{ steps.tf-outputs.outputs.web_distribution_id }}
      api_endpoint: ${{ steps.tf-outputs.outputs.api_endpoint }}
      images_cdn_domain: ${{ steps.tf-outputs.outputs.images_cdn_domain }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lambda package
        run: bash infra/terraform/app/scripts/package-lambda.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init
        working-directory: infra/terraform/app

      - name: Terraform workspace
        run: terraform workspace select dev || terraform workspace new dev
        working-directory: infra/terraform/app

      - name: Terraform apply
        run: terraform apply -auto-approve -var-file=../env/dev.tfvars
        working-directory: infra/terraform/app

      - name: Export Terraform outputs
        id: tf-outputs
        run: |
          echo "web_bucket_name=$(terraform output -raw web_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "web_distribution_id=$(terraform output -raw web_cdn_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "api_endpoint=$(terraform output -raw api_endpoint)" >> "$GITHUB_OUTPUT"
          echo "images_cdn_domain=$(terraform output -raw images_cdn_domain)" >> "$GITHUB_OUTPUT"
        working-directory: infra/terraform/app

  deploy_web:
    runs-on: ubuntu-latest
    needs: apply

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ needs.apply.outputs.api_endpoint }}
          NEXT_PUBLIC_IMAGE_PUBLIC_BASE_URL: https://${{ needs.apply.outputs.images_cdn_domain }}
        run: pnpm --filter web build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync apps/web/out s3://${{ needs.apply.outputs.web_bucket_name }}

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ needs.apply.outputs.web_distribution_id }} --paths "/*"
