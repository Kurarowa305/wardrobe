name: CI

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Test
        run: pnpm -r --if-present run test

      - name: Typecheck api
        run: pnpm --filter api exec tsc --noEmit

      - name: Build api
        run: pnpm --filter api exec tsc --outDir dist

      - name: Typecheck web
        run: pnpm --filter web exec tsc --noEmit

      - name: Routing spec test
        run: pnpm --filter web test:routing

      - name: Overflow menu spec test
        run: pnpm --filter web test:overflow-menu

      - name: UI foundation test
        run: pnpm --filter web test:ui-foundation

      - name: Build web
        run: |
          if [ -d apps/web/app ] || [ -d apps/web/pages ]; then
            pnpm --filter web build
          else
            echo "Skip web build: apps/web/app or apps/web/pages is missing"
          fi
