name: CI

on:
  push:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Test
        run: pnpm -r --if-present run test

      - name: Typecheck api
        run: pnpm --filter api exec tsc --noEmit

      - name: Build api
        run: pnpm --filter api exec tsc --outDir dist

      - name: Typecheck web
        run: pnpm --filter web exec tsc --noEmit

      - name: Routing spec test
        run: pnpm --filter web test:routing

      - name: Overflow menu spec test
        run: pnpm --filter web test:overflow-menu

      - name: UI foundation spec test
        run: pnpm --filter web test:ui-foundation

      - name: Tab bar fixed spec test
        run: pnpm --filter web test:tab-bar-fixed

      - name: Query foundation spec test
        run: pnpm --filter web test:query-foundation

      - name: Query keys spec test
        run: pnpm --filter web test:query-keys

      - name: API client foundation spec test
        run: pnpm --filter web test:api-client-foundation

      - name: Clothing types spec test
        run: pnpm --filter web test:clothing-types

      - name: Template types spec test
        run: pnpm --filter web test:template-types

      - name: History types spec test
        run: pnpm --filter web test:history-types

      - name: History fixtures spec test
        run: pnpm --filter web test:history-fixtures

      - name: History API client spec test
        run: pnpm --filter web test:history-api-client

      - name: History MSW handlers spec test
        run: pnpm --filter web test:history-msw-handlers

      - name: History Query/Mutation hooks spec test
        run: pnpm --filter web test:history-query-mutation-hooks

      - name: History list screen spec test
        run: pnpm --filter web test:history-list-screen

      - name: History detail screen spec test
        run: pnpm --filter web test:history-detail-screen

      - name: Home screen spec test
        run: pnpm --filter web test:home-screen

      - name: Template fixtures spec test
        run: pnpm --filter web test:template-fixtures

      - name: Template API client spec test
        run: pnpm --filter web test:template-api-client

      - name: Template MSW handlers spec test
        run: pnpm --filter web test:template-msw-handlers

      - name: Template tab navigation spec test
        run: pnpm --filter web test:template-tab-navigation

      - name: Template Query/Mutation hooks spec test
        run: pnpm --filter web test:template-query-mutation-hooks

      - name: Clothing fixtures spec test
        run: pnpm --filter web test:clothing-fixtures

      - name: Clothing API client spec test
        run: pnpm --filter web test:clothing-api-client

      - name: Image presign API client spec test
        run: pnpm --filter web test:image-presign-api-client

      - name: Image presign MSW handler spec test
        run: pnpm --filter web test:image-presign-msw-handler

      - name: Image pseudo upload spec test
        run: pnpm --filter web test:image-pseudo-upload

      - name: Image key payload spec test
        run: pnpm --filter web test:image-key-payload

      - name: Image URL resolution spec test
        run: pnpm --filter web test:image-url-resolution

      - name: Clothing query hooks spec test
        run: pnpm --filter web test:clothing-query-hooks

      - name: Clothing mutation hooks spec test
        run: pnpm --filter web test:clothing-mutation-hooks

      - name: Clothing list screen spec test
        run: pnpm --filter web test:clothing-list-screen

      - name: Clothing detail screen spec test
        run: pnpm --filter web test:clothing-detail-screen

      - name: Clothing create screen spec test
        run: pnpm --filter web test:clothing-create-screen

      - name: Clothing edit screen spec test
        run: pnpm --filter web test:clothing-edit-screen

      - name: Clothing image selection UI spec test
        run: pnpm --filter web test:clothing-image-selection-ui

      - name: Clothing delete flow spec test
        run: pnpm --filter web test:clothing-delete-flow

      - name: History delete flow spec test
        run: pnpm --filter web test:history-delete-flow

      - name: Template list screen spec test
        run: pnpm --filter web test:template-list-screen

      - name: Template form screen spec test
        run: pnpm --filter web test:template-form-screen

      - name: Template detail screen spec test
        run: pnpm --filter web test:template-detail-screen

      - name: Template delete flow spec test
        run: pnpm --filter web test:template-delete-flow

      - name: Record method screen spec test
        run: pnpm --filter web test:record-method-screen

      - name: Record template screen spec test
        run: pnpm --filter web test:record-template-screen

      - name: Record combination screen spec test
        run: pnpm --filter web test:record-combination-screen

      - name: MSW foundation spec test
        run: pnpm --filter web test:msw-foundation

      - name: MSW scenarios spec test
        run: pnpm --filter web test:msw-scenarios

      - name: Clothing MSW handlers spec test
        run: pnpm --filter web test:clothing-msw-handlers

      - name: Build web
        run: |
          if [ -d apps/web/app ] || [ -d apps/web/pages ] || [ -d apps/web/src/app ]; then
            pnpm --filter web build
          else
            echo "Skip web build: apps/web/app, apps/web/pages, and apps/web/src/app are missing"
          fi
