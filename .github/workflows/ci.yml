name: CI

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          pnpm --filter api exec tsc --noEmit
          pnpm --filter web exec tsc --noEmit

      - name: Test
        run: pnpm --filter api exec node --test

      - name: Build api
        run: pnpm --filter api exec tsc --outDir dist --rootDir src


      - name: Build web
        run: pnpm --filter web build
